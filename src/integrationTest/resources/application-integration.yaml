spring:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql

# Also disable the Spring Boot OTLP management to be safe
management:
  otlp:
    tracing:
      endpoint: http://disabled
  tracing:
    enabled: false

# Satisfy Langfuse autoconfiguration used by prompt resolver.
# Tests don't call Langfuse unless you invoke AI flows explicitly.
plavonra:
  ai:
    langfuse:
      client:
        base-url: ${PLAVONRA_AI_LANGFUSE_CLIENT_BASE_URL:https://cloud.langfuse.com}